name: Build y Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-y-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Clonando mi repositorio
      uses: actions/checkout@v4

    - name: Configurando .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restaurando dependencias
      run: dotnet restore

    - name: Compilando proyecto
      run: dotnet build

    - name: Ejecutando Pruebas
      run: dotnet test