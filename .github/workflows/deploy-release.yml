name: Deploy y Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Clonando mi repositorio
      uses: actions/checkout@v4

    - name: Configurando .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: Publicando la api
      run: dotnet publish -c Release -o ./publish

    - name: Creando archivo ZIP (El Asset)
      run: |
        cd publish
        zip -r ../app-release.zip .
        cd ..

    - name: Crear GitHub Release y subir Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ### Entrega de Proyecto C# Web API
          - Compilaciˇn automßtica multiplataforma.
          - Asset empaquetado correctamente.
        draft: false
        prerelease: false
        files: app-release.zip